<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예송논쟁 & 붕당정치 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --aged: #e8dfc8;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --red: #8b1a1a;
    --red-light: #c0392b;
    --blue: #1a3a5c;
    --blue-light: #2980b9;
    --green: #1a5c2e;
    --green-light: #27ae60;
    --shadow: rgba(26,18,8,0.15);
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--aged);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(184,134,11,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(139,26,26,0.06) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  .header {
    background: var(--ink);
    color: var(--paper);
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 18px,
      rgba(184,134,11,0.06) 18px, rgba(184,134,11,0.06) 19px
    );
  }
  .header-badge {
    display: inline-block;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 4px 14px;
    margin-bottom: 12px;
    position: relative;
  }
  .header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 900;
    position: relative;
    line-height: 1.3;
  }
  .header h1 span { color: var(--gold-light); }
  .header-sub {
    margin-top: 6px;
    font-size: 13px;
    color: rgba(245,240,232,0.6);
    position: relative;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: var(--ink);
    padding: 0 24px 16px;
  }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 12px; color: rgba(245,240,232,0.5);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 4px; background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* ── MAIN CONTAINER ── */
  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── SCORE STRIP ── */
  .score-strip {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .score-chip {
    flex: 1; background: var(--paper);
    border-radius: var(--radius);
    padding: 12px 8px; text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
    border-top: 3px solid transparent;
  }
  .score-chip.correct  { border-top-color: var(--green-light); }
  .score-chip.wrong    { border-top-color: var(--red-light); }
  .score-chip.remain   { border-top-color: var(--gold); }
  .score-chip .num {
    font-family: 'Noto Serif KR', serif;
    font-size: 26px; font-weight: 900;
    line-height: 1;
  }
  .score-chip.correct .num { color: var(--green); }
  .score-chip.wrong   .num { color: var(--red); }
  .score-chip.remain  .num { color: var(--gold); }
  .score-chip .label { font-size: 11px; color: #888; margin-top: 3px; }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--paper);
    border-radius: var(--radius);
    box-shadow: 0 4px 20px var(--shadow);
    overflow: hidden;
    animation: cardIn 0.35s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-header {
    background: var(--ink);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .q-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px; font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
  }
  .q-category {
    font-size: 11px; letter-spacing: 1px;
    color: rgba(245,240,232,0.45);
    margin-left: auto;
  }
  .q-body { padding: 22px 20px 0; }
  .q-text {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(15px, 3.5vw, 17px);
    font-weight: 600;
    line-height: 1.7;
    color: var(--ink);
    margin-bottom: 20px;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 8px; padding-bottom: 4px; }
  .opt-btn {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    background: white;
    border: 1.5px solid #ddd6c4;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; line-height: 1.6;
    text-align: left; color: var(--ink);
    transition: all 0.18s;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: #fffdf5;
    transform: translateX(3px);
  }
  .opt-btn .opt-label {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700; font-size: 14px;
    color: var(--gold); min-width: 20px;
  }
  .opt-btn.correct-ans {
    border-color: var(--green-light);
    background: #f0faf4;
  }
  .opt-btn.correct-ans .opt-label { color: var(--green); }
  .opt-btn.wrong-ans {
    border-color: var(--red-light);
    background: #fdf2f2;
  }
  .opt-btn.wrong-ans .opt-label { color: var(--red); }
  .opt-btn:disabled { cursor: default; transform: none; }
  .opt-icon { margin-left: auto; font-size: 16px; min-width: 20px; text-align: right; }

  /* ── EXPLANATION ── */
  .explanation {
    margin: 0 20px 20px;
    border-radius: 6px;
    overflow: hidden;
    animation: explainIn 0.3s ease;
  }
  @keyframes explainIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .exp-header {
    padding: 10px 14px;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    display: flex; align-items: center; gap: 6px;
  }
  .explanation.correct .exp-header { background: var(--green); color: white; }
  .explanation.wrong   .exp-header { background: var(--red);   color: white; }
  .exp-body {
    padding: 14px;
    font-size: 13.5px; line-height: 1.75;
    background: white; border: 1px solid #e8e0d0; border-top: none;
  }
  .exp-body strong { color: var(--gold); }

  /* ── NEXT BUTTON ── */
  .next-wrap { padding: 16px 20px 20px; }
  .next-btn {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--paper);
    border: none; border-radius: 6px;
    font-family: 'Noto Serif KR', serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    position: relative; overflow: hidden;
  }
  .next-btn::after {
    content: ' →';
    color: var(--gold);
  }
  .next-btn:hover { background: #2d2418; }

  /* ── RESULT PAGE ── */
  .result-page { display: none; animation: cardIn 0.4s ease; }
  .result-hero {
    background: var(--ink);
    border-radius: var(--radius);
    padding: 36px 24px;
    text-align: center;
    color: var(--paper);
    margin-bottom: 20px;
    box-shadow: 0 4px 20px var(--shadow);
    position: relative; overflow: hidden;
  }
  .result-hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(184,134,11,0.15), transparent 60%);
  }
  .result-grade {
    font-family: 'Noto Serif KR', serif;
    font-size: 64px; font-weight: 900;
    color: var(--gold-light);
    line-height: 1; position: relative;
  }
  .result-score-text {
    font-size: 18px; margin-top: 8px;
    color: rgba(245,240,232,0.7); position: relative;
  }
  .result-msg {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px; margin-top: 16px;
    color: var(--paper); position: relative;
  }

  .result-breakdown {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 20px;
  }
  .breakdown-card {
    background: var(--paper);
    border-radius: var(--radius);
    padding: 16px; text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .breakdown-card .b-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px; font-weight: 900;
  }
  .breakdown-card.b-correct .b-num { color: var(--green); }
  .breakdown-card.b-wrong   .b-num { color: var(--red); }
  .breakdown-card .b-label { font-size: 12px; color: #888; margin-top: 2px; }

  .wrong-list {
    background: var(--paper);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 2px 8px var(--shadow);
    margin-bottom: 20px;
  }
  .wrong-list h3 {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px; font-weight: 700;
    color: var(--red); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .wrong-item {
    padding: 10px 0;
    border-bottom: 1px dashed #ddd6c4;
    font-size: 13px; line-height: 1.6;
    color: #555;
  }
  .wrong-item:last-child { border-bottom: none; }
  .wrong-item strong { color: var(--ink); display: block; margin-bottom: 2px; }

  .action-btns { display: flex; gap: 10px; }
  .action-btn {
    flex: 1; padding: 14px;
    border: none; border-radius: 6px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-retry {
    background: var(--red);
    color: white;
  }
  .btn-retry:hover { background: #6d1515; }
  .btn-restart {
    background: var(--ink);
    color: var(--paper);
  }
  .btn-restart:hover { background: #2d2418; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">조선사 핵심 논제</div>
  <h1>예송논쟁 &amp; <span>붕당정치의 변질</span></h1>
  <p class="header-sub">20문항 · 정답 즉시 해설 · 오답 재도전</p>
</div>
<div class="progress-wrap">
  <div class="progress-info">
    <span id="prog-label">0 / 20</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="container">
  <!-- SCORE STRIP -->
  <div class="score-strip">
    <div class="score-chip correct">
      <div class="num" id="sc-correct">0</div>
      <div class="label">정답</div>
    </div>
    <div class="score-chip wrong">
      <div class="num" id="sc-wrong">0</div>
      <div class="label">오답</div>
    </div>
    <div class="score-chip remain">
      <div class="num" id="sc-remain">20</div>
      <div class="label">남은 문제</div>
    </div>
  </div>

  <!-- QUIZ AREA -->
  <div id="quiz-area"></div>

  <!-- RESULT PAGE -->
  <div class="result-page" id="result-page">
    <div class="result-hero">
      <div class="result-grade" id="res-grade">--</div>
      <div class="result-score-text" id="res-score-text"></div>
      <div class="result-msg" id="res-msg"></div>
    </div>
    <div class="result-breakdown">
      <div class="breakdown-card b-correct">
        <div class="b-num" id="res-correct">0</div>
        <div class="b-label">정답</div>
      </div>
      <div class="breakdown-card b-wrong">
        <div class="b-num" id="res-wrong">0</div>
        <div class="b-label">오답</div>
      </div>
    </div>
    <div class="wrong-list" id="wrong-list-wrap" style="display:none">
      <h3>📌 오답 문제 목록</h3>
      <div id="wrong-list-body"></div>
    </div>
    <div class="action-btns">
      <button class="action-btn btn-retry" id="btn-retry" style="display:none" onclick="retryWrong()">오답 다시 풀기</button>
      <button class="action-btn btn-restart" onclick="restartAll()">처음부터 다시</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  {
    cat: "붕당정치 배경",
    q: "조선 후기 붕당정치의 출발점이 된 사림 분열로 가장 먼저 형성된 두 붕당은?",
    opts: ["동인과 서인", "남인과 북인", "노론과 소론", "서인과 남인"],
    ans: 0,
    exp: "16세기 후반 사림이 <strong>동인과 서인</strong>으로 분열되며 붕당정치가 시작되었습니다. 이후 동인은 남인과 북인으로 다시 갈라졌고, 17세기에는 서인과 남인이 주요 붕당으로 대립하였습니다."
  },
  {
    cat: "붕당정치 이념",
    q: "본래 붕당정치가 추구했던 이상적 정치 원리로 가장 적절한 것은?",
    opts: ["국왕의 절대 권력 강화", "공론에 의한 상호 비판과 견제", "단일 붕당의 집권 유지", "외척 세력의 정치 참여"],
    ans: 1,
    exp: "붕당정치의 본래 이상은 <strong>공론(公論)에 의한 상호 비판과 견제</strong>를 통해 올바른 정치를 실현하는 것이었습니다. 복수 붕당의 공존과 견제, 공론에 의한 정책 결정이 핵심 원리였습니다."
  },
  {
    cat: "기해예송",
    q: "기해예송(1659)은 어떤 사건을 계기로 발생하였는가?",
    opts: ["인조 승하 후 소현세자빈의 상복 문제", "효종 승하 후 자의대비의 상복 기간 문제", "현종 승하 후 명성왕후의 상복 문제", "효종비 인선왕후의 승하"],
    ans: 1,
    exp: "기해예송(1659)은 <strong>효종 승하 후 자의대비(인조의 계비)가 상복을 얼마나 입어야 하는가</strong>를 둘러싸고 서인과 남인 사이에서 발생한 논쟁입니다."
  },
  {
    cat: "기해예송",
    q: "기해예송에서 서인 송시열이 주장한 상복 기간은?",
    opts: ["참최복(3년)", "기년복(1년)", "대공복(9개월)", "소공복(5개월)"],
    ans: 1,
    exp: "송시열은 효종이 <strong>차자(둘째 아들)</strong>임을 근거로 자의대비는 <strong>기년복(1년)</strong>을 입어야 한다고 주장하였습니다. 『주자가례』의 종법 질서와 '체이부정(體而不正)'의 논리가 그 근거였습니다."
  },
  {
    cat: "기해예송",
    q: "기해예송에서 남인 허목이 주장의 근거로 삼은 문헌은?",
    opts: ["『주자가례』", "『경국대전』", "『의례(儀禮)』", "『소학(小學)』"],
    ans: 2,
    exp: "남인 허목은 <strong>『의례(儀禮)』</strong>와 왕실 예제를 근거로, 왕위를 계승한 군주는 장자와 동일하게 보아야 한다며 <strong>참최복(3년)</strong>을 주장하였습니다."
  },
  {
    cat: "기해예송",
    q: "'체이부정(體而不正)'이란 논리에 관한 설명으로 옳은 것은?",
    opts: [
      "왕을 사족 종법질서 밖에 두어야 한다는 남인의 주장",
      "왕위를 이었으나 적장자가 아니므로 왕실도 종법 원칙을 따라야 한다는 서인의 논리",
      "왕실의 예제는 일반 사족과 달리 특수하게 적용해야 한다는 원칙",

    ans: 1,
    exp: "'체이부정'은 <strong>왕통은 이었으나 정통(장자)이 아니다</strong>라는 뜻으로, 서인 송시열이 효종을 차자로 규정하여 자의대비의 상복 기간을 1년으로 주장하는 데 사용한 핵심 논리입니다."
  },
  {
    cat: "기해예송",
    q: "기해예송의 결과로 옳은 것은?",
    opts: ["현종이 남인의 참최복(3년) 주장을 채택하였다.", "현종이 서인의 기년복(1년) 주장을 채택하였다.", "양측 주장을 절충하여 대공복(9개월)이 결정되었다.", "결론을 내리지 못하고 다음 왕대로 미뤄졌다."],
    ans: 1,
    exp: "기해예송에서 현종은 <strong>서인의 기년복(1년) 주장을 채택</strong>하였습니다. 이로써 서인이 정국의 주도권을 유지하게 되었습니다."
  },
  {
    cat: "갑인예송",
    q: "갑인예송(1674)의 핵심 쟁점은 무엇인가?",
    opts: ["효종의 상복 기간", "자의대비의 효종에 대한 복상 기간", "효종비 인선왕후의 상에 대한 자의대비의 복상 기간", "현종의 상복 기간"],
    ans: 2,
    exp: "갑인예송은 <strong>효종비 인선왕후가 승하하자 자의대비가 며느리에 대해 얼마나 상복을 입어야 하는가</strong>를 둘러싼 논쟁입니다. 시어머니가 며느리를 위한 복상 문제였습니다."
  },
  {
    cat: "갑인예송",
    q: "갑인예송에서 서인과 남인이 각각 주장한 상복 기간으로 옳은 것은?",

let questions = [];
let current = 0;
let score = { correct: 0, wrong: 0 };
let wrongIndexes = [];
let answered = false;
let isRetryMode = false;

function init(qs) {
  questions = qs;
  current = 0;
  score = { correct: 0, wrong: 0 };
  wrongIndexes = [];
  answered = false;
  updateScoreStrip();
  showQuestion();
}

function updateProgress() {
  const total = questions.length;
  const done = current;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${done} / ${total}`;
  document.getElementById('prog-pct').textContent = pct + '%';
}

function updateScoreStrip() {
  document.getElementById('sc-correct').textContent = score.correct;
  document.getElementById('sc-wrong').textContent = score.wrong;
  document.getElementById('sc-remain').textContent = questions.length - current;
}

function showQuestion() {
  if (current >= questions.length) { showResult(); return; }
  answered = false;
  updateProgress();
  const q = questions[current];
  const letters = ['①', '②', '③', '④'];
  const area = document.getElementById('quiz-area');
  area.innerHTML = `
    <div class="q-card" id="q-card">
      <div class="q-header">
        <span class="q-num">Q${isRetryMode ? '' : current + 1}. ${isRetryMode ? '오답 재도전' : `문제 ${current + 1} / ${questions.length}`}</span>
        <span class="q-category">${q.cat}</span>
      </div>
      <div class="q-body">
        <div class="q-text">${q.q}</div>
        <div class="options" id="opts">
          ${q.opts.map((o, i) => `
            <button class="opt-btn" onclick="select(${i})" id="opt-${i}">
              <span class="opt-label">${letters[i]}</span>
              <span>${o}</span>
              <span class="opt-icon" id="icon-${i}"></span>
            </button>
          `).join('')}
        </div>
      </div>
      <div id="exp-slot"></div>
      <div class="next-wrap" id="next-wrap" style="display:none">
        <button class="next-btn" onclick="nextQ()">${current + 1 >= questions.length ? '결과 보기' : '다음 문제'}</button>
      </div>
    </div>
  `;
}

function select(chosen) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const correct = q.ans;
  const isCorrect = chosen === correct;

  if (isCorrect) {
    score.correct++;
  } else {
    score.wrong++;
    if (!isRetryMode) wrongIndexes.push(current);
  }

  // Style options
  for (let i = 0; i < q.opts.length; i++) {
    const btn = document.getElementById('opt-' + i);
    const icon = document.getElementById('icon-' + i);
    btn.disabled = true;
    if (i === correct) {
      btn.classList.add('correct-ans');
      icon.textContent = '✓';
    } else if (i === chosen && !isCorrect) {
      btn.classList.add('wrong-ans');
      icon.textContent = '✗';
    }
  }

  // Show explanation
  const expSlot = document.getElementById('exp-slot');
  expSlot.innerHTML = `
    <div class="explanation ${isCorrect ? 'correct' : 'wrong'}" style="margin-top:14px">
      <div class="exp-header">${isCorrect ? '✓ 정답입니다!' : '✗ 오답입니다'}</div>
      <div class="exp-body">${q.exp}</div>
    </div>
  `;

  updateScoreStrip();
  document.getElementById('next-wrap').style.display = 'block';
}

function nextQ() {
  current++;
  updateScoreStrip();
  showQuestion();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  const rp = document.getElementById('result-page');
  rp.style.display = 'block';
  updateProgress();

  const total = questions.length;
  const pct = Math.round((score.correct / total) * 100);
  let grade, msg;
  if (pct >= 95)      { grade = 'S'; msg = '🏆 완벽한 이해! 역사 시험 준비 완료입니다.'; }
  else if (pct >= 85) { grade = 'A'; msg = '👏 우수한 실력입니다. 오답 부분만 점검하세요.'; }
  else if (pct >= 70) { grade = 'B'; msg = '📚 양호합니다. 오답 문제를 다시 풀어보세요.'; }
  else if (pct >= 50) { grade = 'C'; msg = '🔄 기본기를 다시 정리하고 재도전하세요.'; }
  else                { grade = 'D'; msg = '💪 답안 가이드부터 다시 검토해 보세요.'; }

  document.getElementById('res-grade').textContent = grade;
  document.getElementById('res-score-text').textContent = `${score.correct} / ${total} 정답  (${pct}%)`;
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-correct').textContent = score.correct;
  document.getElementById('res-wrong').textContent = score.wrong;

  // Wrong list
  const wrongWrap = document.getElementById('wrong-list-wrap');
  const wrongBody = document.getElementById('wrong-list-body');
  if (wrongIndexes.length > 0) {
    wrongWrap.style.display = 'block';
    document.getElementById('btn-retry').style.display = 'block';
    wrongBody.innerHTML = wrongIndexes.map(idx => {
      const q = ALL_QUESTIONS[idx];
      return `<div class="wrong-item"><strong>Q${idx + 1}. ${q.q}</strong>정답: ${['①','②','③','④'][q.ans]} ${q.opts[q.ans]}</div>`;
    }).join('');
  }
}

function retryWrong() {
  isRetryMode = true;
  const retryQs = wrongIndexes.map(i => ALL_QUESTIONS[i]);
  score = { correct: 0, wrong: 0 };
  wrongIndexes = [];
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('result-page').style.display = 'none';
  current = 0;
  questions = retryQs;
  updateScoreStrip();
  document.getElementById('sc-remain').textContent = questions.length;
  showQuestion();
}

function restartAll() {
  isRetryMode = false;
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('result-page').style.display = 'none';
  init([...ALL_QUESTIONS]);
}

// Start
init([...ALL_QUESTIONS]);
</script>
